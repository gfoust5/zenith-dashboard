<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:   #000000;
    --white:   #FFFFFF;
    --amber:   #E7D19D;
    --gold:    #AE9465;
    --blue:    #30586E;
    --gray:    #5A5554;
    --bg:      #080808;
    --card:    #131313;
    --card2:   #181818;
    --border:  rgba(174,148,101,0.15);
    --border2: rgba(255,255,255,0.06);
    --muted:   rgba(255,255,255,0.38);
  }
  body { background: var(--bg); color: var(--white); font-family: 'Josefin Sans', sans-serif; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 100px; }

  /* NAV */
  .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .nav-logo { height: 30px; filter: invert(1); opacity: .85; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); text-decoration: none; opacity: .7; transition: opacity .2s; }
  .nav-links a:hover { opacity: 1; }

  /* HEADER */
  .header { margin-bottom: 32px; animation: fadeUp .6s ease both; }
  .header-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; display: block; }
  .header-title { font-size: 36px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; line-height: 1; color: var(--white); }
  .header-title span { color: var(--gold); }
  .header-sub { font-size: 11px; font-weight: 300; letter-spacing: 1.5px; color: var(--muted); margin-top: 10px; line-height: 1.8; }

  /* WEEK NAV */
  .week-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: var(--card); border: 1px solid var(--border2); border-radius: 6px; padding: 14px 20px; }
  .week-nav { display: flex; align-items: center; gap: 16px; }
  .week-btn { background: none; border: 1px solid var(--border2); color: var(--muted); width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .week-btn:hover { border-color: var(--gold); color: var(--gold); }
  .week-info { text-align: center; }
  .week-dates { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--white); }
  .week-theme-display { font-size: 11px; font-weight: 300; letter-spacing: 2px; color: var(--gold); margin-top: 3px; }
  .week-right { display: flex; align-items: center; gap: 10px; }
  .week-theme-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; color: var(--amber); font-family: 'Josefin Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 6px 12px; outline: none; width: 260px; transition: border-color .2s; }
  .week-theme-input::placeholder { color: var(--muted); font-weight: 300; text-transform: none; letter-spacing: 1px; }
  .week-theme-input:focus { border-color: var(--gold); }
  .week-today-btn { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); cursor: pointer; opacity: .7; transition: opacity .2s; background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 3px; }
  .week-today-btn:hover { opacity: 1; }

  /* PROGRESS BAR */
  .progress-bar-wrap { margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
  .progress-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }
  .progress-count { font-size: 11px; font-weight: 600; color: var(--gold); white-space: nowrap; }

  /* DAY GRID */
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }

  .day-card { background: var(--card); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .2s; }
  .day-card.today { border-color: var(--gold); }

  .day-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border2); position: relative; }
  .day-name { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--white); }
  .day-date { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 1px; }
  .day-today-dot { position: absolute; top: 10px; right: 12px; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: none; }
  .day-card.today .day-today-dot { display: block; }

  .day-format { padding: 8px 12px 6px; border-bottom: 1px solid var(--border2); }
  .format-tag { font-size: 8px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; display: inline-block; }

  /* Format colors */
  .fmt-talking  { background: rgba(48,88,110,.25);  color: #7aadca; border: 1px solid rgba(48,88,110,.4); }
  .fmt-carousel { background: rgba(174,148,101,.15); color: var(--amber); border: 1px solid rgba(174,148,101,.3); }
  .fmt-wins     { background: rgba(90,149,90,.2);    color: #90d490; border: 1px solid rgba(90,149,90,.4); }
  .fmt-gym      { background: rgba(174,100,60,.2);   color: #e8a07a; border: 1px solid rgba(174,100,.4); }
  .fmt-captain  { background: rgba(174,148,101,.2);  color: var(--gold); border: 1px solid rgba(174,148,101,.35); }
  .fmt-flex     { background: rgba(90,85,84,.2);     color: #aaa; border: 1px solid rgba(90,85,84,.4); }

  .day-theme-tag { font-size: 9px; font-weight: 300; letter-spacing: .5px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .day-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

  /* IDEA INPUT */
  .idea-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .idea-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; color: var(--white); font-family: 'Josefin Sans', sans-serif; font-size: 11px; font-weight: 300; letter-spacing: .3px; line-height: 1.6; padding: 8px 10px; resize: none; outline: none; min-height: 70px; transition: border-color .2s; }
  .idea-input::placeholder { color: var(--muted); }
  .idea-input:focus { border-color: var(--border); }

  /* POST ITEMS */
  .post-list { display: flex; flex-direction: column; gap: 5px; }
  .post-item { display: flex; align-items: flex-start; gap: 8px; background: var(--card2); border: 1px solid var(--border2); border-radius: 4px; padding: 7px 9px; transition: border-color .2s; }
  .post-item.posted { border-color: rgba(174,148,101,.2); }
  .post-check { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .2s; }
  .post-item.posted .post-check { background: var(--gold); border-color: var(--gold); }
  .post-check-icon { display: none; }
  .post-item.posted .post-check-icon { display: block; }
  .post-text { font-size: 10px; font-weight: 300; letter-spacing: .3px; color: var(--white); flex: 1; line-height: 1.5; transition: color .2s; word-break: break-word; }
  .post-item.posted .post-text { color: var(--gold); text-decoration: line-through; text-decoration-color: rgba(174,148,101,.4); }
  .post-del { color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0; transition: color .2s; margin-top: -1px; }
  .post-del:hover { color: #e07070; }

  .add-post-wrap { display: flex; gap: 5px; margin-top: 4px; }
  .add-post-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; color: var(--white); font-family: 'Josefin Sans', sans-serif; font-size: 10px; font-weight: 300; letter-spacing: .3px; padding: 6px 8px; outline: none; transition: border-color .2s; }
  .add-post-input::placeholder { color: var(--muted); }
  .add-post-input:focus { border-color: var(--border); }
  .add-post-btn { background: var(--gold); border: none; color: var(--black); font-family: 'Josefin Sans', sans-serif; font-size: 14px; font-weight: 700; width: 26px; height: 26px; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s; }
  .add-post-btn:hover { background: var(--amber); }

  /* POSTED BADGE */
  .posted-badge { font-size: 8px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); padding: 3px 8px; border: 1px solid var(--border); border-radius: 2px; display: none; margin-top: auto; }
  .all-posted .posted-badge { display: inline-block; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    .day-grid { grid-template-columns: 1fr 1fr; }
    .nav-links { display: none; }
    .week-theme-input { width: 160px; }
  }
  @media (max-width: 480px) {
    .day-grid { grid-template-columns: 1fr; }
    .week-theme-input { width: 130px; }
  }
</style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <img class="nav-logo" id="nav-logo" alt="Zenith Performance">
    <div class="nav-links">
      <a href="index.html">← Dashboard</a>
      <a href="zenith-weekly-schedule.html">Schedule</a>
      <a href="zenith-kpa.html">KPA</a>
      <a href="zenith-kpi.html">KPI</a>
    </div>
  </nav>

  <div class="header">
    <span class="header-label">Zenith Performance</span>
    <div class="header-title">Content <span>Calendar</span></div>
    <p class="header-sub">Weekly theme. Daily format. Specific ideas. All in one place.</p>
  </div>

  <div class="week-bar">
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">&#8592;</button>
      <div class="week-info">
        <div class="week-dates" id="week-dates">—</div>
        <div class="week-theme-display" id="week-theme-display">&nbsp;</div>
      </div>
      <button class="week-btn" onclick="changeWeek(1)">&#8594;</button>
    </div>
    <div class="week-right">
      <input class="week-theme-input" id="week-theme-input" type="text" placeholder="Weekly theme / focus..." oninput="saveWeekTheme()" />
      <button class="week-today-btn" onclick="goToday()">This Week</button>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <span class="progress-label">Posted This Week</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-count" id="progress-count">0 / 0</span>
  </div>

  <div class="day-grid" id="day-grid"></div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────
const DAY_CONFIG = [
  { name: 'Monday',    short: 'Mon', format: 'Talking Head / Text',    fmtClass: 'fmt-talking',  fmtNote: 'Easy, direct, personal',           angles: ['Hot take', 'Quick tip', 'Opinion', 'Motivation'] },
  { name: 'Tuesday',   short: 'Tue', format: 'Carousel / Educational', fmtClass: 'fmt-carousel', fmtNote: 'Teach something valuable',         angles: ['How-to', 'Common mistake', 'Science breakdown', 'Programming tip'] },
  { name: 'Wednesday', short: 'Wed', format: 'Win Wednesday',          fmtClass: 'fmt-wins',     fmtNote: 'Client results & transformations', angles: ['Client check-in win', 'Progress photo', 'PR hit', 'Testimonial'] },
  { name: 'Thursday',  short: 'Thu', format: 'Gym / In The Trenches',  fmtClass: 'fmt-gym',      fmtNote: 'High effort, raw, in the gym',     angles: ['Training clip', 'Coach commentary', 'Lift breakdown', 'Real talk'] },
  { name: 'Friday',    short: 'Fri', format: 'Talking Head / Text',    fmtClass: 'fmt-talking',  fmtNote: 'Whichever not used Monday',        angles: ['Sales angle', 'Close a belief gap', 'Call to action', 'Story-driven'] },
  { name: 'Saturday',  short: 'Sat', format: "Captain's Log",         fmtClass: 'fmt-captain',  fmtNote: 'Personal lift — your story, raw', angles: ['Personal lift recap', 'Week reflection', 'Journey update', 'Raw honesty'] },
  { name: 'Sunday',    short: 'Sun', format: 'Flex Day',               fmtClass: 'fmt-flex',     fmtNote: 'Any format — feel it out',        angles: ['Mindset', 'Behind the scenes', 'Personal story'] },
];

// Pre-loaded themes (week key → theme)
const PRESET_THEMES = {
  '2025-05-04': 'Squat Week — Own The Hole',
  '2025-05-11': 'Records Week — Plant The Flag',
  '2025-05-18': 'Final Heavy Week — Biggest Meet Ever',
  '2025-05-25': 'Anaheim — Meet Week (Nationals)',
  '2026-05-04': 'Squat Week — Own The Hole',
  '2026-05-11': 'Records Week — Plant The Flag',
  '2026-05-18': 'Final Heavy Week — Biggest Meet Ever',
  '2026-05-25': 'Anaheim — Meet Week (Nationals)',
};

// ── STATE ─────────────────────────────────────────────
let currentWeekStart = getThisWeekMonday();

function getThisWeekMonday() {
  const d = new Date();
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return new Date(d);
}

function weekKey(monday) {
  return monday.toISOString().slice(0,10);
}

function dayKey(date) {
  return date.toISOString().slice(0,10);
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

// ── STORAGE ───────────────────────────────────────────
function getWeekData(wk) {
  try { return JSON.parse(localStorage.getItem('zp_content_week_' + wk)) || {}; } catch { return {}; }
}
function saveWeekData(wk, data) {
  localStorage.setItem('zp_content_week_' + wk, JSON.stringify(data));
}
function getDayData(dk) {
  try { return JSON.parse(localStorage.getItem('zp_content_day_' + dk)) || { idea: '', posts: [] }; } catch { return { idea: '', posts: [] }; }
}
function saveDayData(dk, data) {
  localStorage.setItem('zp_content_day_' + dk, JSON.stringify(data));
}

// ── WEEK THEME ────────────────────────────────────────
function saveWeekTheme() {
  const wk = weekKey(currentWeekStart);
  const val = document.getElementById('week-theme-input').value;
  const data = getWeekData(wk);
  data.theme = val;
  saveWeekData(wk, data);
  document.getElementById('week-theme-display').textContent = val || '\u00a0';
}

// ── RENDER ────────────────────────────────────────────
function render() {
  const wk = weekKey(currentWeekStart);
  const weekData = getWeekData(wk);

  // Load preset theme if no saved theme
  let theme = weekData.theme;
  if (theme === undefined) {
    theme = PRESET_THEMES[wk] || '';
    if (theme) { weekData.theme = theme; saveWeekData(wk, weekData); }
  }

  // Week dates label — Sun to Sat
  const monday = currentWeekStart;
  const sunday = addDays(currentWeekStart, 6);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('week-dates').textContent = fmt(monday) + ' — ' + fmt(sunday);
  document.getElementById('week-theme-display').textContent = theme || '\u00a0';
  document.getElementById('week-theme-input').value = theme || '';

  // Today
  const today = new Date(); today.setHours(0,0,0,0);

  // Build days: Sun, Mon, Tue, Wed, Thu, Fri, Sat
  // Sunday = currentWeekStart - 1, Mon = currentWeekStart, ..., Sat = currentWeekStart + 5
  const dayOffsets = [0, 1, 2, 3, 4, 5, 6]; // Mon, Tue, Wed, Thu, Fri, Sat, Sun
  const dayConfigOrder = [0, 1, 2, 3, 4, 5, 6]; // matches DAY_CONFIG indices

  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';

  let totalPosts = 0, postedPosts = 0;

  dayOffsets.forEach((offset, i) => {
    const date = addDays(currentWeekStart, offset);
    const dk = dayKey(date);
    const cfg = DAY_CONFIG[dayConfigOrder[i]];
    const dayData = getDayData(dk);
    const isToday = date.getTime() === today.getTime();

    // Count progress
    if (dayData.posts) {
      dayData.posts.forEach(p => {
        totalPosts++;
        if (p.posted) postedPosts++;
      });
    }

    const allPosted = dayData.posts && dayData.posts.length > 0 && dayData.posts.every(p => p.posted);

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (allPosted ? ' all-posted' : '');
    card.id = 'card-' + dk;

    // Posts HTML
    const postsHtml = (dayData.posts || []).map((p, pi) => `
      <div class="post-item${p.posted ? ' posted' : ''}" id="post-${dk}-${pi}">
        <div class="post-check" onclick="togglePost('${dk}', ${pi})">
          <svg class="post-check-icon" width="9" height="7" viewBox="0 0 9 7" fill="none"><polyline points="1,3.5 3,5.5 8,1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="post-text">${escHtml(p.text)}</span>
        <span class="post-del" onclick="deletePost('${dk}', ${pi})">×</span>
      </div>
    `).join('');

    // Angles as placeholder hint
    const angleHint = cfg.angles.slice(0,2).join(' · ');

    card.innerHTML = `
      <div class="day-header">
        <div class="day-name">${cfg.name}</div>
        <div class="day-date">${date.toLocaleDateString('en-US', { month:'short', day:'numeric' })}</div>
        <div class="day-today-dot"></div>
      </div>
      <div class="day-format">
        <span class="format-tag ${cfg.fmtClass}">${cfg.format}</span>
        <div class="day-theme-tag">${cfg.fmtNote}</div>
      </div>
      <div class="day-body">
        <div>
          <div class="idea-label">Content Idea</div>
          <textarea class="idea-input" id="idea-${dk}" placeholder="${angleHint}..." oninput="saveIdea('${dk}')">${escHtml(dayData.idea || '')}</textarea>
        </div>
        <div>
          <div class="idea-label">Posts</div>
          <div class="post-list" id="posts-${dk}">${postsHtml}</div>
          <div class="add-post-wrap">
            <input class="add-post-input" id="add-${dk}" type="text" placeholder="Add post..." onkeydown="if(event.key==='Enter')addPost('${dk}')">
            <button class="add-post-btn" onclick="addPost('${dk}')">+</button>
          </div>
        </div>
        <div class="posted-badge">✓ All Posted</div>
      </div>
    `;

    grid.appendChild(card);
  });

  // Progress
  document.getElementById('progress-fill').style.width = totalPosts > 0 ? (postedPosts / totalPosts * 100) + '%' : '0%';
  document.getElementById('progress-count').textContent = postedPosts + ' / ' + totalPosts + ' posted';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ACTIONS ───────────────────────────────────────────
function saveIdea(dk) {
  const data = getDayData(dk);
  data.idea = document.getElementById('idea-' + dk).value;
  saveDayData(dk, data);
}

function addPost(dk) {
  const inp = document.getElementById('add-' + dk);
  const text = inp.value.trim();
  if (!text) return;
  const data = getDayData(dk);
  if (!data.posts) data.posts = [];
  data.posts.push({ text, posted: false });
  saveDayData(dk, data);
  inp.value = '';
  render();
}

function togglePost(dk, idx) {
  const data = getDayData(dk);
  data.posts[idx].posted = !data.posts[idx].posted;
  saveDayData(dk, data);
  render();
}

function deletePost(dk, idx) {
  const data = getDayData(dk);
  data.posts.splice(idx, 1);
  saveDayData(dk, data);
  render();
}

function changeWeek(dir) {
  currentWeekStart = addDays(currentWeekStart, dir * 7);
  render();
}

function goToday() {
  currentWeekStart = getThisWeekMonday();
  render();
}
